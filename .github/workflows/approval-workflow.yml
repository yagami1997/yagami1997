name: GPG Contact Request

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to approve — action will encrypt your email and close the issue"
        required: true
        type: number

permissions:
  issues: write
  contents: read

jobs:
  # Step 1: Auto-reply when a new Email Request issue is opened
  initial-response:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && contains(github.event.issue.title, 'Email Request')
    steps:
      - name: Ask for GPG public key
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for reaching out.

            To establish a secure channel, please share your **GPG public key** as a reply to this issue.

            **How to export your public key:**

            ```bash
            gpg --armor --export YOUR_KEY_ID_OR_EMAIL
            ```

            Paste the full block (starting with `-----BEGIN PGP PUBLIC KEY BLOCK-----`) as a comment below.

            Once received and approved, I will post my contact email encrypted with your key — only you will be able to read it.

      - name: Add label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: awaiting-gpg-key

  # Step 2: Owner approves — encrypts contact email with requester's GPG key and posts ciphertext
  # Trigger privately: gh workflow run approval-workflow.yml -f issue_number=<N>
  approve-and-encrypt:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Extract requester's GPG public key from comments
        id: extract-key
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.inputs.issue_number }}
            });

            for (const comment of comments) {
              const match = comment.body.match(
                /(-----BEGIN PGP PUBLIC KEY BLOCK-----[\s\S]+?-----END PGP PUBLIC KEY BLOCK-----)/
              );
              if (match) {
                core.setOutput('gpg_key', match[1]);
                return;
              }
            }

            core.setFailed('No GPG public key block found in issue comments.');

      - name: Encrypt contact email with requester's key
        id: encrypt
        env:
          REQUESTER_KEY: ${{ steps.extract-key.outputs.gpg_key }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: |
          # Import requester's public key
          echo "$REQUESTER_KEY" | gpg --batch --import

          # Extract fingerprint
          FINGERPRINT=$(echo "$REQUESTER_KEY" | \
            gpg --batch --with-colons --import-options show-only --import 2>/dev/null | \
            awk -F: '/^fpr/ { print $10; exit }')

          if [ -z "$FINGERPRINT" ]; then
            echo "Failed to extract fingerprint" >&2
            exit 1
          fi

          # Encrypt the contact email
          ENCRYPTED=$(echo "$CONTACT_EMAIL" | \
            gpg --batch --armor --encrypt \
                --recipient "$FINGERPRINT" \
                --trust-model always)

          # Write to GITHUB_OUTPUT (multiline safe)
          {
            echo "encrypted<<GPGEOF"
            echo "$ENCRYPTED"
            echo "GPGEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post encrypted email and close issue
        uses: actions/github-script@v7
        env:
          ENCRYPTED_EMAIL: ${{ steps.encrypt.outputs.encrypted }}
        with:
          script: |
            const encrypted = process.env.ENCRYPTED_EMAIL;
            const issueNumber = ${{ github.event.inputs.issue_number }};

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                'Your request has been approved.',
                '',
                'Below is my contact email, encrypted with your GPG public key.',
                'Only you can decrypt it.',
                '',
                '```',
                encrypted,
                '```',
                '',
                'To decrypt:',
                '',
                '```bash',
                '# Save the block above to a file, then:',
                'gpg --decrypt contact.asc',
                '```',
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
