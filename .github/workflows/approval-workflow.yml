name: GPG Contact Request

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to approve — action will encrypt your GPG fingerprint and close the issue"
        required: true
        type: number

permissions:
  issues: write
  contents: read

jobs:
  # Step 1: Auto-reply when a new Email Request issue is opened
  initial-response:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && contains(github.event.issue.title, 'Email Request')
    steps:
      - name: Ask for GPG public key
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for reaching out.

            To establish a secure channel, please share your GPG information as a reply to this issue. Either of the following works:

            **Option A — Full public key block:**

            ```bash
            gpg --armor --export YOUR_KEY_ID_OR_EMAIL
            ```

            Paste the full block starting with `-----BEGIN PGP PUBLIC KEY BLOCK-----`.

            **Option B — Key fingerprint:**

            Paste your 40-character fingerprint, e.g. `4FBD 2F95 3DFA F373 17A2  2ECE 1A90 41C4 0840 FE13`
            *(that's the fingerprint of Zoë Kooyman, Executive Director of the FSF. If you have something to say to the free software world, you can always write her an encrypted email too.)*

            Your key must be uploaded to `keys.openpgp.org`. Fingerprints from other keyservers are not accepted.

            Once received and approved, I will reply with my GPG fingerprint encrypted to your key. Import it from `keys.openpgp.org` to find my contact address and send me an encrypted email.

      - name: Add label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: awaiting-gpg-key

  # Step 2: Owner approves — encrypts GPG fingerprint with requester's key and posts ciphertext
  # Trigger privately: gh workflow run approval-workflow.yml -f issue_number=<N>
  approve-and-encrypt:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Extract GPG key or fingerprint from comments
        id: extract-key
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.inputs.issue_number }}
            });

            for (const comment of comments) {
              // Option A: full public key block
              const keyMatch = comment.body.match(
                /(-----BEGIN PGP PUBLIC KEY BLOCK-----[\s\S]+?-----END PGP PUBLIC KEY BLOCK-----)/
              );
              if (keyMatch) {
                core.setOutput('gpg_key', keyMatch[1]);
                core.setOutput('mode', 'key');
                return;
              }

              // Option B: fingerprint (40 hex chars, spaces allowed)
              const fpMatch = comment.body.match(
                /([0-9A-Fa-f]{4}(?:\s+[0-9A-Fa-f]{4}){9})/
              );
              if (fpMatch) {
                core.setOutput('fingerprint', fpMatch[1].replace(/\s+/g, ''));
                core.setOutput('mode', 'fingerprint');
                return;
              }
            }

            core.setFailed('No GPG public key or fingerprint found in issue comments.');

      - name: Encrypt GPG fingerprint with requester's key
        id: encrypt
        env:
          MODE: ${{ steps.extract-key.outputs.mode }}
          REQUESTER_KEY: ${{ steps.extract-key.outputs.gpg_key }}
          REQUESTER_FP: ${{ steps.extract-key.outputs.fingerprint }}
          MY_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
        run: |
          if [ "$MODE" = "key" ]; then
            # Import full public key block
            echo "$REQUESTER_KEY" | gpg --batch --import

            # Extract fingerprint from imported key
            REQUESTER_FP=$(echo "$REQUESTER_KEY" | \
              gpg --batch --with-colons --import-options show-only --import 2>/dev/null | \
              awk -F: '/^fpr/ { print $10; exit }')
          else
            # Fetch requester's key from keyserver by fingerprint
            gpg --batch --keyserver hkps://keys.openpgp.org --recv-keys "$REQUESTER_FP"
          fi

          if [ -z "$REQUESTER_FP" ]; then
            echo "Failed to resolve requester's GPG fingerprint" >&2
            exit 1
          fi

          # Encrypt my GPG fingerprint with requester's public key
          ENCRYPTED=$(echo "$MY_FINGERPRINT" | \
            gpg --batch --armor --encrypt \
                --recipient "$REQUESTER_FP" \
                --trust-model always)

          # Write to GITHUB_OUTPUT (multiline safe)
          {
            echo "encrypted<<GPGEOF"
            echo "$ENCRYPTED"
            echo "GPGEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post encrypted fingerprint and close issue
        uses: actions/github-script@v7
        env:
          ENCRYPTED_FP: ${{ steps.encrypt.outputs.encrypted }}
        with:
          script: |
            const encrypted = process.env.ENCRYPTED_FP;
            const issueNumber = ${{ github.event.inputs.issue_number }};

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                'Your request has been approved.',
                '',
                'Below is my GPG fingerprint, encrypted with your public key.',
                'Only you can decrypt it.',
                '',
                '```',
                encrypted,
                '```',
                '',
                'To decrypt and import my key:',
                '',
                '```bash',
                '# Decrypt to get my fingerprint',
                'gpg --decrypt contact.asc',
                '',
                '# Import my key from keyserver',
                'gpg --keyserver hkps://keys.openpgp.org --recv-keys <fingerprint>',
                '',
                '# My contact email is in the key UID — send encrypted email only.',
                '```',
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
